name: CI

# 나쁜 머지를 막는 게이트. main 으로의 PR 과 main 푸시에서 돈다.
# 실제 배포는 여기가 아니라 deploy.yml 이 맡는다 — 이 CI 가 main 에서 성공하면 workflow_run 으로
# Deploy 가 이어 돈다(ADR-0016). 즉 이 워크플로는 "초록이어야 머지·배포된다"는 관문이다.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # 손으로 깨울 수 있어야 한다. 실제로 GitHub 이 main 머지 push 에 워크플로를 아예 만들지
  # 않은 적이 있다(#41 머지, check-runs 0 — Actions·GitHub 둘 다 정상이었다). 그때 CI 를
  # 깨울 방법이 없어 배포가 멈췄고, main 에 빈 커밋을 올려 우회해야 했다. 이 트리거가 있으면
  # 이력을 더럽히지 않고 다시 태운다. deploy.yml 도 이 이벤트를 받도록 맞춰 뒀다.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: 게이트 · format·lint·typecheck·boundaries·unit·build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 로컬 검증과 같은 메이저(26)로 고정 — "로컬은 되는데 CI 는 깨지는" 표류를 줄인다.
          node-version: 26
          cache: npm
      # npm ci 는 package.json 의 allowScripts 승인 목록을 따라 workerd·esbuild·sharp
      # postinstall 을 실행한다(npm 11 의 스크립트 게이팅). 이게 없으면 esbuild 바이너리가
      # 안 깔려 build 가 깨진다.
      - run: npm ci
      - name: format:check
        run: npm run format:check
      - name: lint
        run: npm run lint
      - name: typecheck
        run: npm run typecheck
      - name: boundaries (dependency-cruiser)
        run: npm run boundaries
      - name: unit (Vitest · Workers pool)
        run: npm test
      # 스키마↔마이그레이션 정합성(드리프트) 검증. 마이그레이션이 실제로 적용되는지는 unit 이
      # 이미 증명한다(applyD1Migrations 로 workerd D1 에 적용). 오프라인이라 CF 인증 불요.
      - name: db 마이그레이션 정합성 (drizzle-kit check)
        run: npx drizzle-kit check
      - name: build (next build)
        run: npm run build

      # next build 가 통과해도 실제 배포 번들러는 거부할 수 있다 — Node 미들웨어가 그랬다
      # (게이트 전부 초록, 배포에서만 실패). 배포와 같은 빌드를 게이트에서 돌려 미리 잡는다.
      - name: 배포 빌드 (opennextjs-cloudflare build)
        run: npx opennextjs-cloudflare build

  e2e:
    name: e2e 스모크 · Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - name: Playwright 브라우저 설치
        run: npx playwright install --with-deps chromium
      - name: e2e
        run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
