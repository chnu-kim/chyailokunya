name: CI

# 나쁜 머지를 막는 게이트. main 으로의 PR 과 main 푸시에서 돈다.
# 실제 배포는 여기가 아니라 Cloudflare Workers Builds(GitHub 연동, Phase 0)가 맡는다 —
# 이 워크플로는 "초록이어야 머지된다"는 관문일 뿐이다.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: 게이트 · format·lint·typecheck·boundaries·unit·build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 로컬 검증과 같은 메이저(26)로 고정 — "로컬은 되는데 CI 는 깨지는" 표류를 줄인다.
          node-version: 26
          cache: npm
      # npm ci 는 package.json 의 allowScripts 승인 목록을 따라 workerd·esbuild·sharp
      # postinstall 을 실행한다(npm 11 의 스크립트 게이팅). 이게 없으면 esbuild 바이너리가
      # 안 깔려 build 가 깨진다.
      - run: npm ci
      - name: format:check
        run: npm run format:check
      - name: lint
        run: npm run lint
      - name: typecheck
        run: npm run typecheck
      - name: boundaries (dependency-cruiser)
        run: npm run boundaries
      - name: unit (Vitest · Workers pool)
        run: npm test
      - name: build (next build)
        run: npm run build

  e2e:
    name: e2e 스모크 · Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - name: Playwright 브라우저 설치
        run: npx playwright install --with-deps chromium
      - name: e2e
        run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
