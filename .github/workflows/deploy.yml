name: Deploy

# CI("게이트")가 main 에서 초록으로 끝난 뒤에만 배포한다(ADR-0016). 순서가 중요하다:
#   빌드(산출물 검증) → 원격 D1 마이그레이션 → 사전 빌드 산출물 배포.
# 빌드를 마이그레이션보다 먼저 해서, 빌드가 깨지면 D1 을 아예 안 건드린다(구 워커 + 새 스키마
# 스큐 방지). 마이그레이션은 expand-contract(하위호환)로 둬서, 그 뒤 업로드가 실패해도 구
# 워커가 새 스키마에서 안전하다(초기 스키마는 순수 CREATE 라 해당). 자격은 이식된 Actions
# secret 으로만.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  # 배포는 직렬로 — 진행 중 배포를 취소해 반쯤 나간 상태를 만들지 않는다(큐잉).
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: OpenNext → Cloudflare Workers
    # 배포 조건: CI 성공 + **push 또는 workflow_dispatch 트리거** + **같은 저장소**(fork 배제).
    #
    # pull_request CI 는 여전히 제외한다 — 소스 브랜치명이 'main' 인 fork PR 이 workflow_run
    # branches 필터를 통과해 미머지 코드를 프로덕션 자격으로 배포하는 구멍을 막는다.
    #
    # workflow_dispatch 를 넣어도 그 구멍은 안 열린다: 수동 실행은 **저장소 write 권한자만**
    # 할 수 있고 fork 의 ref 로는 못 건다. 게다가 workflow_run 의 branches 필터가 main 으로
    # 좁히고, 아래 "main tip 확인" 스텝이 head_sha≠main tip 이면 배포를 끊는다.
    # 넣는 이유는 GitHub 이 main push 에 워크플로를 안 만든 사고를 겪었기 때문이다(#41).
    if: github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch') && github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    # CF 자격은 job-level 이 아니라 실제로 쓰는 두 스텝(D1 마이그레이션·배포)에만 준다 —
    # job env 로 두면 npm ci(postinstall)·OpenNext 빌드 스텝까지 배포 토큰이 노출된다.
    steps:
      - uses: actions/checkout@v4
        with:
          # CI 가 검증한 바로 그 커밋(workflow_run 은 기본이 default 브랜치 tip 이라 명시).
          ref: ${{ github.event.workflow_run.head_sha }}
      # 오래된 CI 성공 run 을 재실행하면 옛 커밋이 배포돼 코드가 롤백될 수 있다(그 사이 새 커밋·
      # 마이그레이션이 이미 나갔는데). head_sha 가 현재 main tip 이 아니면 중단한다.
      - name: main tip 확인
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          git fetch origin main --depth=1
          TIP="$(git rev-parse origin/main)"
          echo "workflow_run head_sha=$HEAD_SHA  origin/main tip=$TIP"
          test "$TIP" = "$HEAD_SHA" || { echo "::error::오래된 CI 재실행 — main tip 아님. 배포 중단."; exit 1; }
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      # allowScripts 승인 목록대로 workerd·esbuild·sharp postinstall 실행(npm 11 게이팅).
      - run: npm ci
      # 산출물이 buildable 한지 먼저 확인 — 여기서 실패하면 아래 D1 을 안 건드린다.
      - name: OpenNext 빌드
        run: npx opennextjs-cloudflare build
      # 빌드가 성공한 뒤에만 스키마를 원격 D1 에 적용한다(이미 적용된 건 건너뜀 — 멱등).
      - name: 원격 D1 마이그레이션 적용
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply chyailokunya --remote
      # 이미 빌드된 .open-next 를 업로드한다(재빌드 없음 — deploy 는 "built app" 을 올린다).
      - name: 배포 (OpenNext, 사전 빌드 산출물)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx opennextjs-cloudflare deploy
