name: Deploy

# CI(게이트)가 main 에서 초록으로 끝난 뒤에만 배포한다 — 깨진 main 이 프로덕션으로 나가지
# 않게 workflow_run 으로 게이트에 건다(ADR-0009). 배포는 OpenNext(Workers)로 하고, 그 전에
# 원격 D1 마이그레이션을 적용해 "스키마 없는 채로 코드가 나가 /games 가 500" 나는 걸 구조적으로
# 막는다(마이그레이션 → 배포 순서). 자격은 이식된 Actions secret(CLOUDFLARE_API_TOKEN·
# CLOUDFLARE_ACCOUNT_ID)로만 — 저장소엔 두지 않는다.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  # 배포는 직렬로 — 진행 중 배포를 취소해 반쯤 나간 상태를 만들지 않는다(큐잉).
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: OpenNext → Cloudflare Workers
    # CI 가 성공했을 때만. 실패·취소면 배포 안 함.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          # CI 가 검증한 바로 그 커밋을 배포한다(workflow_run 은 기본이 default 브랜치 tip 이라 명시).
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      # allowScripts 승인 목록대로 workerd·esbuild·sharp postinstall 을 실행(npm 11 게이팅).
      - run: npm ci
      # 스키마를 코드보다 먼저 원격 D1 에 적용한다(이미 적용된 마이그레이션은 건너뜀 — 멱등).
      # --local 이 아니라 --remote 라 위 토큰이 D1 쓰기 권한을 써서 붙는다.
      - name: 원격 D1 마이그레이션 적용
        run: npx wrangler d1 migrations apply chyailokunya --remote
      # opennextjs-cloudflare build + deploy. 워커·에셋·바인딩을 올리고 workers.dev 로 서빙한다.
      - name: 배포 (OpenNext)
        run: npm run deploy
